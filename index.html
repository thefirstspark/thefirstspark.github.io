<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ THE FIRST SPARK ✦ Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #e0e6ff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Cosmic animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 191, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 20, 147, 0.1) 0%, transparent 50%);
            animation: cosmicPulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes cosmicPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.1); }
        }

        /* Starfield */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
            padding: 60px;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 4em;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, #a5f3fc 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(165, 243, 252, 0.8);
            animation: glowPulse 3s ease-in-out infinite;
            position: relative;
        }

        .logo::before {
            content: '✦';
            position: absolute;
            left: -80px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6em;
            animation: spinStar 4s linear infinite;
        }

        .logo::after {
            content: '✦';
            position: absolute;
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6em;
            animation: spinStar 4s linear infinite reverse;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 60px rgba(165, 243, 252, 0.8); }
            50% { text-shadow: 0 0 100px rgba(165, 243, 252, 1), 0 0 120px rgba(192, 132, 252, 0.6); }
        }

        @keyframes spinStar {
            from { transform: translateY(-50%) rotate(0deg); }
            to { transform: translateY(-50%) rotate(360deg); }
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #a5f3fc;
            text-shadow: 0 0 30px rgba(165, 243, 252, 0.5);
        }

        p {
            font-size: 1.4em;
            line-height: 1.8;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .cta-button {
            background: linear-gradient(135deg, #7c3aed 0%, #c084fc 50%, #00d9ff 100%);
            padding: 25px 60px;
            border-radius: 16px;
            font-family: 'Orbitron', monospace;
            font-size: 1.4em;
            border: 3px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.6);
            margin: 15px;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: ctaShine 3s infinite;
        }

        @keyframes ctaShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .cta-button:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.8), 0 0 80px rgba(0, 217, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .cta-button span {
            position: relative;
            z-index: 1;
        }

        .links {
            margin-top: 60px;
        }

        .secondary-link {
            color: #00d9ff;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
            margin: 0 20px;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .secondary-link:hover {
            text-shadow: 0 0 30px rgba(0, 217, 255, 1);
            color: #a5f3fc;
        }
    </style>
</head>
<body>
    <!-- Starfield Background -->
    <div class="starfield" id="starfield"></div>

    <div class="container">
        <div class="logo">THE FIRST SPARK</div>

        <h1>Cosmic Reciprocity Engine</h1>

        <p>
            Where transparency meets the universe. A new architecture for consciousness platforms
            built on reciprocity, not extraction.
        </p>

        <div>
            <a href="presentation.html" class="cta-button">
                <span>View Presentation →</span>
            </a>
        </div>

        <div class="links">
            <a href="#about" class="secondary-link">About</a>
            <a href="#contact" class="secondary-link">Contact</a>
            <a href="https://github.com/thefirstspark" class="secondary-link" target="_blank">GitHub</a>
        </div>
    </div>

    <script>
        // Starfield generator
        function createStarfield() {
            const starfield = document.getElementById('starfield');
            const starCount = 200;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                const size = Math.random() * 3;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const delay = Math.random() * 3;
                const duration = 2 + Math.random() * 2;

                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = x + '%';
                star.style.top = y + '%';
                star.style.animationDelay = delay + 's';
                star.style.animationDuration = duration + 's';

                starfield.appendChild(star);
            }
        }

        createStarfield();
    </script>
</body>
</html>

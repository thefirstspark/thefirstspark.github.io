<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIM3 — Coming Soon</title>
    <meta name="description" content="DENIM3 is coming. Explore our universe in the meantime.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --void: #03040d;
            --denim-deep: #0a0f2e;
            --denim: #1e3a8a;
            --denim-bright: #3b82f6;
            --denim-glow: rgba(59, 130, 246, 0.35);
            --indigo: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.3);
            --steel: #93c5fd;
            --white: rgba(255,255,255,0.92);
            --white-dim: rgba(255,255,255,0.45);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--void);
            color: var(--white);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ── Starfield ── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Ambient glow orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(30,58,138,0.4) 0%, transparent 70%);
            top: -100px; left: -150px;
            animation-duration: 14s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, transparent 70%);
            bottom: -80px; right: -120px;
            animation-duration: 10s;
            animation-direction: alternate-reverse;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
            top: 40%; left: 60%;
            animation-duration: 16s;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* ── Main content ── */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        /* ── Status pill ── */
        .status-pill {
            display: inline-block;
            font-family: var(--font-display);
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: var(--denim-bright);
            border: 1px solid rgba(59,130,246,0.4);
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            margin-bottom: 2rem;
            background: rgba(59,130,246,0.07);
            animation: pulse-border 3s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(59,130,246,0.4); box-shadow: 0 0 0 transparent; }
            50% { border-color: rgba(59,130,246,0.9); box-shadow: 0 0 16px rgba(59,130,246,0.25); }
        }

        /* ── Logo ── */
        .logo {
            font-family: var(--font-display);
            font-size: clamp(3rem, 12vw, 6.5rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            line-height: 1;
            color: var(--white);
            text-shadow:
                0 0 40px rgba(59,130,246,0.5),
                0 0 80px rgba(59,130,246,0.2);
            margin-bottom: 1rem;
            animation: glow-breathe 4s ease-in-out infinite;
        }

        @keyframes glow-breathe {
            0%, 100% { text-shadow: 0 0 40px rgba(59,130,246,0.5), 0 0 80px rgba(59,130,246,0.2); }
            50%       { text-shadow: 0 0 60px rgba(59,130,246,0.8), 0 0 120px rgba(99,102,241,0.4); }
        }

        .tagline {
            font-family: var(--font-body);
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--white-dim);
            text-transform: uppercase;
            margin-bottom: 3.5rem;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.4), rgba(99,102,241,0.4), transparent);
            margin-bottom: 3rem;
        }

        /* ── Bridge text ── */
        .bridge-text {
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 0.18em;
            color: var(--white-dim);
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* ── Cards ── */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 620px;
            margin: 0 auto;
        }

        .card {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card-a::before {
            background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%);
        }

        .card-b::before {
            background: radial-gradient(circle at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 70%);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.2);
        }

        .card-a:hover { box-shadow: 0 20px 60px rgba(59,130,246,0.2); }
        .card-b:hover { box-shadow: 0 20px 60px rgba(99,102,241,0.2); }

        .card:hover::before { opacity: 1; }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--white);
        }

        .card-a .card-name { color: var(--denim-bright); }
        .card-b .card-name { color: var(--indigo); }

        .card-desc {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--white-dim);
            letter-spacing: 0.05em;
            line-height: 1.5;
            text-align: center;
        }

        .card-cta {
            font-family: var(--font-display);
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .card-a .card-cta {
            border: 1px solid rgba(59,130,246,0.5);
            color: var(--denim-bright);
            background: rgba(59,130,246,0.08);
        }

        .card-b .card-cta {
            border: 1px solid rgba(99,102,241,0.5);
            color: var(--indigo);
            background: rgba(99,102,241,0.08);
        }

        .card-a:hover .card-cta {
            background: rgba(59,130,246,0.2);
            box-shadow: 0 0 20px rgba(59,130,246,0.3);
        }

        .card-b:hover .card-cta {
            background: rgba(99,102,241,0.2);
            box-shadow: 0 0 20px rgba(99,102,241,0.3);
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-family: var(--font-display);
            font-size: 0.5rem;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.15);
            z-index: 10;
        }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .cards {
                grid-template-columns: 1fr;
                max-width: 320px;
            }
            html, body { overflow-y: auto; }
        }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
    <div class="status-pill">COMING SOON</div>

    <h1 class="logo">DENIM3</h1>
    <p class="tagline">Something is being built here</p>

    <div class="divider"></div>

    <p class="bridge-text">In the meantime — explore the universe</p>

    <div class="cards">
        <a class="card card-a" href="https://obitura.com" target="_blank" rel="noopener">
            <div class="card-icon">◈</div>
            <div class="card-name">OBITURA</div>
            <div class="card-desc">Enter the world of Obitura</div>
            <div class="card-cta">VISIT →</div>
        </a>

        <a class="card card-b" href="https://thefirstspark.shop" target="_blank" rel="noopener">
            <div class="card-icon">⚡</div>
            <div class="card-name">THE FIRST SPARK</div>
            <div class="card-desc">95+ consciousness tools & the Sparkverse</div>
            <div class="card-cta">EXPLORE →</div>
        </a>
    </div>
</div>

<div class="footer">DENIM3.COM &nbsp;·&nbsp; ALL RIGHTS RESERVED</div>

<script>
    // Starfield
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 5000);
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.2 + 0.2,
                alpha: Math.random() * 0.6 + 0.1,
                speed: Math.random() * 0.003 + 0.001,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    let frame = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;
        for (const s of stars) {
            const alpha = s.alpha * (0.6 + 0.4 * Math.sin(frame * s.speed + s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(147, 197, 253, ${alpha})`;
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    draw();
</script>
</body>
</html>

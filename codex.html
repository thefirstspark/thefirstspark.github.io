            --soft-white: #e8e8e8;

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--space-black);
            color: var(--soft-white);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Star background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(2px 2px at 15% 85%, rgba(212,175,55,0.15) 0%, transparent 100%),
                radial-gradient(2px 2px at 85% 15%, rgba(139,92,246,0.15) 0%, transparent 100%);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--sacred-gold), var(--electric-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--sacred-gold);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }

        /* Search and Filter */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--deep-void);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 4px;
            color: var(--soft-white);
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--sacred-gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.1);
        }

        .search-box::before {
            content: '⌘';
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .filter-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 20px;
            color: var(--soft-white);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-pill:hover,
        .filter-pill.active {
            background: var(--electric-purple);
            border-color: var(--electric-purple);
        }

        /* Category Sections */
        .category {
            margin-bottom: 3rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(139,92,246,0.2);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--electric-purple), var(--cyan-glow));
            border-radius: 8px;
            font-size: 1.2rem;
        }

        .category h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--soft-white);
        }

        .category-count {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .project-card {
            background: var(--deep-void);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--sacred-gold), var(--electric-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover {
            border-color: rgba(212,175,55,0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--soft-white);
            margin-bottom: 0.5rem;
        }

        .project-desc {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-tags {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.2rem 0.5rem;
            background: rgba(139,92,246,0.1);
            border-radius: 3px;
            font-size: 0.65rem;
            color: var(--electric-purple);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag.gold { background: rgba(212,175,55,0.1); color: var(--sacred-gold); }
        .tag.cyan { background: rgba(34,211,238,0.1); color: var(--cyan-glow); }

        .project-link {
            padding: 0.4rem 0.8rem;
            background: transparent;
            border: 1px solid var(--sacred-gold);
            border-radius: 4px;
            color: var(--sacred-gold);
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s ease;
        }

        .project-link:hover {
            background: var(--sacred-gold);
            color: var(--space-black);
        }

        /* Status Indicators */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.65rem;
            margin-left: 0.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status.live .status-dot { background: #22c55e; }
        .status.wip .status-dot { background: var(--sacred-gold); }
        .status.planned .status-dot { background: var(--muted); }

        /* Coming Soon Section */

            background: linear-gradient(135deg, rgba(139,92,246,0.05), rgba(34,211,238,0.05));
            border: 1px dashed rgba(139,92,246,0.3);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .coming-soon-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .coming-soon-item:last-child {

        }

        .coming-soon-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(139,92,246,0.2);
            border-radius: 6px;
        }

        .coming-soon-text {
            flex: 1;
        }

        .coming-soon-title {
            font-size: 0.9rem;
            color: var(--soft-white);
        }

        .coming-soon-desc {
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* Footer */

            text-align: center;
            padding: 3rem 0;
            margin-top: 2rem;
            border-top: 1px solid rgba(212,175,55,0.1);
            color: var(--muted);
            font-size: 0.75rem;
        }

        footer a {
            color: var(--sacred-gold);
            text-decoration: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .stats-bar { gap: 1.5rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>

        // Render functions
        function renderProjects() {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '';
            
            let totalCount = 0;
            let liveCount = 0;
            let toolCount = 0;
            let soulMapCount = 0;

            for (const [category, data] of Object.entries(projects)) {
                const categoryEl = document.createElement('div');
                categoryEl.className = 'category';
                categoryEl.dataset.category = category;

                const items = data.items;
                totalCount += items.length;
                items.forEach(item => {
                    if (item.status === 'live') liveCount++;
                    if (item.tags?.includes('tool')) toolCount++;
                    if (item.tags?.includes('soul-map')) soulMapCount++;
                });

                categoryEl.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon">${data.icon}</div>
                        <h2>${category}</h2>
                        <span class="category-count">${items.length} items</span>
                    </div>
                    <div class="project-grid">
                        ${items.map(item => `
                            <div class="project-card" data-tags="${(item.tags || []).join(',')}" data-name="${item.name.toLowerCase()}" data-desc="${(item.desc || '').toLowerCase()}">
                                <div class="project-title">
                                    ${item.name}
                                    <span class="status ${item.status}">
                                        <span class="status-dot"></span>
                                        ${item.status}
                                    </span>
                                </div>
                                <div class="project-desc">${item.desc || ''}</div>
                                <div class="project-meta">
                                    <div class="project-tags">
                                        ${(item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                                    </div>
                                    ${item.url ? `<a href="${item.url}" target="_blank" class="project-link">View →</a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                if (category === 'Coming Soon') {
                    categoryEl.querySelector('.project-grid').className = 'coming-soon';
                    categoryEl.querySelector('.coming-soon').innerHTML = items.map(item => `
                        <div class="coming-soon-item" data-tags="${(item.tags || []).join(',')}" data-name="${item.name.toLowerCase()}" data-desc="${(item.desc || '').toLowerCase()}">
                            <div class="coming-soon-icon">
                                ${item.status === 'wip' ? '🔨' : '📋'}
                            </div>
                            <div class="coming-soon-text">
                                <div class="coming-soon-title">${item.name}</div>
                                <div class="coming-soon-desc">${item.desc || ''}</div>
                            </div>
                            <div class="project-tags">
                                ${(item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            ${item.url ? `<a href="${item.url}" target="_blank" class="project-link">View →</a>` : ''}
                        </div>
                    `).join('');
                }

                container.appendChild(categoryEl);
            }

            // Update stats
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('liveCount').textContent = liveCount;
            document.getElementById('toolCount').textContent = toolCount;
            document.getElementById('soulMapCount').textContent = soulMapCount;
        }

        // Filter & Search
        function filterProjects(searchTerm, tagFilter) {
            const cards = document.querySelectorAll('.project-card, .coming-soon-item');
            const categories = document.querySelectorAll('.category');

            cards.forEach(card => {
                const name = card.dataset.name || '';
                const desc = card.dataset.desc || '';
                const tags = card.dataset.tags || '';

                const matchesSearch = !searchTerm || 
                    name.includes(searchTerm.toLowerCase()) || 
                    desc.includes(searchTerm.toLowerCase());

                const matchesFilter = tagFilter === 'all' || tags.includes(tagFilter);

                card.classList.toggle('hidden', !(matchesSearch && matchesFilter));
            });

            // Hide empty categories
            categories.forEach(cat => {
                const visibleCards = cat.querySelectorAll('.project-card:not(.hidden), .coming-soon-item:not(.hidden)');
                cat.classList.toggle('hidden', visibleCards.length === 0);
            });
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', (e) => {
            const activeFilter = document.querySelector('.filter-pill.active').dataset.filter;
            filterProjects(e.target.value, activeFilter);
        });

        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                filterProjects(document.getElementById('search').value, pill.dataset.filter);
            });
        });

        // Init
        renderProjects();
    </script>
